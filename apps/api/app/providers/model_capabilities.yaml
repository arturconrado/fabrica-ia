version: 1
aliases:
  asf-default:
    upstream_model_env: ASF_DEFAULT_UPSTREAM_MODEL
    upstream_model_default: openai/gpt-5.4-mini
    provider: openrouter
    structured_output: json_schema
    cache_mode: adaptive_openrouter
    cache_min_tokens: 1024
    timeout_seconds: 90
    max_output_tokens: 16000
  asf-fast:
    upstream_model_env: ASF_FAST_UPSTREAM_MODEL
    upstream_model_default: openai/gpt-5.4-mini
    provider: openrouter
    structured_output: json_schema
    cache_mode: adaptive_openrouter
    cache_min_tokens: 1024
    timeout_seconds: 90
    max_output_tokens: 4000
  asf-reasoning:
    upstream_model_env: ASF_REASONING_UPSTREAM_MODEL
    upstream_model_default: anthropic/claude-sonnet-4.5
    provider: openrouter
    structured_output: json_schema
    cache_mode: adaptive_openrouter
    cache_min_tokens: 1024
    timeout_seconds: 240
    max_output_tokens: 16000
  asf-code:
    upstream_model_env: ASF_CODE_UPSTREAM_MODEL
    upstream_model_default: anthropic/claude-sonnet-4.5
    provider: openrouter
    structured_output: json_schema
    cache_mode: adaptive_openrouter
    cache_min_tokens: 1024
    timeout_seconds: 360
    max_output_tokens: 32000

usage_fields:
  cache_read:
    - cache_read_input_tokens
    - cached_tokens
    - prompt_tokens_details.cached_tokens
  cache_write:
    - cache_write_input_tokens
    - cache_creation_input_tokens
    - cache_creation_tokens
  cache_savings_usd:
    - cache_savings_usd
