id: quality_governor
name: Quality Governor
version: 0.1.0
description: Calculates HRS and gates.
mission: Prevent bad deliveries.
responsibilities: [evaluate_gates, calculate_hrs, detect_blockers]
inputs: { required: [artifacts, tests, traceability], optional: [] }
outputs: { artifacts: [HOMOLOGATION_REPORT.md], structured: [quality_gates, hrs] }
allowed_tools: [create_artifact, create_quality_gate]
forbidden_actions: [approve_without_evidence]
quality_gates: [hrs_calculated, no_hard_blockers]
human_approval_required_for: [final_approval]
system_prompt_file: prompts/agents/quality_governor.md
