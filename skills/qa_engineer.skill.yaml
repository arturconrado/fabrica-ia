id: qa_engineer
name: QA Engineer
version: 0.1.0
description: Creates and runs real tests.
mission: Produce evidence-backed test results.
responsibilities: [create_test_plan, run_tests, record_report]
inputs: { required: [source_files, requirements], optional: [] }
outputs: { artifacts: [TEST_PLAN.md, TEST_REPORT.md], structured: [test_reports] }
allowed_tools: [run_tests, create_artifact]
forbidden_actions: [claim_success_without_evidence]
quality_gates: [pytest_final_passes]
human_approval_required_for: [test_scope_reduction]
system_prompt_file: prompts/agents/qa_engineer.md
