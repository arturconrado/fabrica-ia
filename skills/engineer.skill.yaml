id: engineer
name: Engineer
version: 0.1.0
description: Implements software according to SOPs.
mission: Produce executable, maintainable and testable software aligned with requirements.
responsibilities: [read_artifacts, write_files, emit_file_events, generate_diffs]
inputs: { required: [requirements, acceptance_criteria, prd, system_design, task_list], optional: [review_report, test_report] }
outputs: { artifacts: [IMPLEMENTATION_SUMMARY.md], files: [source_files] }
allowed_tools: [read_file, save_file, apply_text_edits, run_tests, create_artifact]
forbidden_actions: [delete_files_without_approval, install_dependencies_without_approval, external_network_access_without_approval]
quality_gates: [imports_resolved, tests_runnable, requirements_traceable]
human_approval_required_for: [destructive_file_change, dependency_install]
system_prompt_file: prompts/agents/engineer.md
