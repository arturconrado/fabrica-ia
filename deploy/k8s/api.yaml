apiVersion: apps/v1
kind: Deployment
metadata:
  name: software-factory-api
  namespace: software-factory
spec:
  replicas: 2
  selector:
    matchLabels:
      app: software-factory-api
  template:
    metadata:
      labels:
        app: software-factory-api
    spec:
      serviceAccountName: software-factory-api
      containers:
        - name: api
          image: software-factory-api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: software-factory-config
            - secretRef:
                name: software-factory-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: software-factory-api
  namespace: software-factory
spec:
  selector:
    app: software-factory-api
  ports:
    - port: 8000
      targetPort: 8000
