apiVersion: v1
kind: ServiceAccount
metadata:
  name: software-factory-api
  namespace: software-factory
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sandbox-job-manager
  namespace: software-factory-sandbox
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: software-factory-sandbox-job-manager
  namespace: software-factory-sandbox
subjects:
  - kind: ServiceAccount
    name: software-factory-api
    namespace: software-factory
roleRef:
  kind: Role
  name: sandbox-job-manager
  apiGroup: rbac.authorization.k8s.io
