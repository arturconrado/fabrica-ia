apiVersion: v1
kind: Secret
metadata:
  name: software-factory-secrets
  namespace: software-factory
type: Opaque
stringData:
  DATABASE_URL: postgresql+psycopg://factory:replace-me@postgres:5432/factory
  ASF_OIDC_ISSUER_URL: https://issuer.example.com/realms/software-factory
  ASF_OIDC_AUDIENCE: software-factory-web
  ASF_OIDC_JWKS_URL: https://issuer.example.com/realms/software-factory/protocol/openid-connect/certs
  ASF_LITELLM_BASE_URL: https://litellm.example.com
  ASF_LITELLM_API_KEY: replace-me
  OPENAI_API_KEY: replace-me
  ASF_S3_ENDPOINT_URL: https://s3.example.com
  ASF_S3_BUCKET: software-factory-artifacts
  ASF_S3_ACCESS_KEY_ID: replace-me
  ASF_S3_SECRET_ACCESS_KEY: replace-me
