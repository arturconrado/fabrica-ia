apiVersion: apps/v1
kind: Deployment
metadata:
  name: software-factory-web
  namespace: software-factory
spec:
  replicas: 2
  selector:
    matchLabels:
      app: software-factory-web
  template:
    metadata:
      labels:
        app: software-factory-web
    spec:
      containers:
        - name: web
          image: software-factory-web:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_BASE_URL
              value: /api-proxy
            - name: API_INTERNAL_BASE_URL
              value: http://software-factory-api:8000
            - name: OIDC_ISSUER_URL
              value: https://identity.example.com/realms/software-factory
            - name: OIDC_PUBLIC_ISSUER_URL
              value: https://identity.example.com/realms/software-factory
            - name: OIDC_CLIENT_ID
              value: software-factory-web
            - name: APP_BASE_URL
              value: https://factory.example.com
            - name: SESSION_COOKIE_SECURE
              value: "true"
---
apiVersion: v1
kind: Service
metadata:
  name: software-factory-web
  namespace: software-factory
spec:
  selector:
    app: software-factory-web
  ports:
    - port: 3000
      targetPort: 3000
