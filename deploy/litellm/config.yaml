model_list:
  - model_name: asf-default
    litellm_params:
      model: openrouter/openai/gpt-5.4-mini
      api_key: os.environ/OPENROUTER_API_KEY
      timeout: 90
  - model_name: asf-fast
    litellm_params:
      model: os.environ/ASF_FAST_UPSTREAM_MODEL
      api_key: os.environ/OPENROUTER_API_KEY
      timeout: 90
  - model_name: asf-reasoning
    litellm_params:
      model: os.environ/ASF_REASONING_UPSTREAM_MODEL
      api_key: os.environ/OPENROUTER_API_KEY
      timeout: 240
  - model_name: asf-code
    litellm_params:
      model: os.environ/ASF_CODE_UPSTREAM_MODEL
      api_key: os.environ/OPENROUTER_API_KEY
      timeout: 360

router_settings:
  # Agent-step retries are recorded by the factory executor. Keep the proxy
  # attempt singular so provider failures remain visible and bounded.
  num_retries: 0
  retry_after: 1
