graph:
  id: software_factory_homologation_v1
  version: 0.1.0
  description: Industrial homologation-grade multi-agent software factory workflow.
  ui:
    title: Agentic Software Factory
    show_technical_nodes: false
    group_by: phase
  phases:
    - { id: demand_classification, label: Classificacao da Demanda }
    - { id: autonomous_acceptance_criteria, label: Criterios de Aceite Autonomos }
    - { id: scope_governance, label: Governanca de Escopo }
    - { id: product_planning, label: Planejamento de Produto }
    - { id: ux_design, label: UX/UI }
    - { id: architecture, label: Arquitetura }
    - { id: data_design, label: Dados }
    - { id: api_contract, label: Contratos de API }
    - { id: task_planning, label: Planejamento de Tarefas }
    - { id: implementation, label: Implementacao }
    - { id: code_review, label: Revisao de Codigo }
    - { id: testing, label: Testes }
    - { id: visual_qa, label: QA Visual }
    - { id: accessibility_qa, label: Acessibilidade }
    - { id: security_review, label: Seguranca }
    - { id: devops_packaging, label: Empacotamento }
    - { id: release_management, label: Release }
    - { id: quality_governance, label: Governanca de Qualidade }
    - { id: human_homologation_approval, label: Aprovacao Humana }
    - { id: final_delivery, label: Entrega Final }
  nodes:
    - { id: USER, type: passthrough, phase: demand_classification }
    - { id: Demand Classifier, type: agent, phase: demand_classification, skill: demand_classifier }
    - { id: Acceptance Criteria Architect, type: agent, phase: autonomous_acceptance_criteria, skill: acceptance_criteria_architect }
    - { id: Scope Governor, type: agent, phase: scope_governance, skill: scope_governor }
    - { id: Product Manager, type: agent, phase: product_planning, skill: product_manager }
    - { id: UX UI Designer, type: agent, phase: ux_design, skill: ux_ui_designer }
    - { id: Architect, type: agent, phase: architecture, skill: architect }
    - { id: Data Architect, type: agent, phase: data_design, skill: data_architect }
    - { id: API Contract Engineer, type: agent, phase: api_contract, skill: api_contract_engineer }
    - { id: Project Manager, type: agent, phase: task_planning, skill: project_manager }
    - { id: Engineer, type: agent, phase: implementation, skill: engineer }
    - { id: Code Reviewer, type: agent, phase: code_review, skill: code_reviewer }
    - { id: QA Engineer, type: agent, phase: testing, skill: qa_engineer }
    - { id: Visual QA Agent, type: agent, phase: visual_qa, skill: visual_qa_agent }
    - { id: Accessibility QA Agent, type: agent, phase: accessibility_qa, skill: accessibility_qa_agent }
    - { id: Security Engineer, type: agent, phase: security_review, skill: security_engineer }
    - { id: DevOps Engineer, type: agent, phase: devops_packaging, skill: devops_engineer }
    - { id: Release Manager, type: agent, phase: release_management, skill: release_manager }
    - { id: Quality Governor, type: agent, phase: quality_governance, skill: quality_governor }
    - { id: Human Approval, type: human_approval, phase: human_homologation_approval, skill: human_supervisor }
    - { id: FINAL, type: passthrough, phase: final_delivery }
  edges:
    - { from: USER, to: Demand Classifier, condition: true }
    - { from: Demand Classifier, to: Acceptance Criteria Architect, condition: success }
    - { from: Acceptance Criteria Architect, to: Scope Governor, condition: success }
    - { from: Scope Governor, to: Product Manager, condition: success }
    - { from: Product Manager, to: UX UI Designer, condition: success }
    - { from: UX UI Designer, to: Architect, condition: success }
    - { from: Architect, to: Data Architect, condition: success }
    - { from: Data Architect, to: API Contract Engineer, condition: success }
    - { from: API Contract Engineer, to: Project Manager, condition: success }
    - { from: Project Manager, to: Engineer, condition: success }
    - { from: Engineer, to: Code Reviewer, condition: success }
    - { from: Code Reviewer, to: Engineer, condition: needs_changes, max_iterations: 2 }
    - { from: Code Reviewer, to: QA Engineer, condition: approved }
    - { from: QA Engineer, to: Engineer, condition: tests_failed, max_iterations: 2 }
    - { from: QA Engineer, to: Visual QA Agent, condition: tests_passed }
    - { from: Visual QA Agent, to: Accessibility QA Agent, condition: passed }
    - { from: Accessibility QA Agent, to: Security Engineer, condition: success }
    - { from: Security Engineer, to: DevOps Engineer, condition: passed }
    - { from: DevOps Engineer, to: Release Manager, condition: success }
    - { from: Release Manager, to: Quality Governor, condition: success }
    - { from: Quality Governor, to: Human Approval, condition: approved_for_homologation }
    - { from: Human Approval, to: FINAL, condition: approved }
